<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>AVEND OG Card · 1200x630</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      font-family: Arial, Helvetica, sans-serif;
      background: #0a0c2e;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    .og {
      position: relative;
      width: 1200px;
      height: 630px;
      background: #0a0c2e;
      overflow: hidden;
    }
    .glow-1 {
      position: absolute; top: -120px; right: -120px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(61,217,214,0.22), transparent 70%);
      z-index: 0;
    }
    .glow-2 {
      position: absolute; bottom: -120px; left: -120px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(139,48,230,0.20), transparent 70%);
      z-index: 0;
    }
    .triangle {
      position: absolute; top: 0; right: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 240px 240px 0;
      border-color: transparent #3DD9D6 transparent transparent;
      opacity: 0.10;
      z-index: 0;
    }
    .bottom-line {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 5px;
      background: linear-gradient(90deg, #3DD9D6 0%, #4B6CE2 50%, #8B30E6 100%);
      z-index: 5;
    }
    .content {
      position: relative;
      z-index: 2;
      padding: 56px 70px;
      width: 1200px;
      height: 630px;
    }
    .brand-name {
      font-size: 34px; font-weight: 900; letter-spacing: 4px;
      color: #fff; line-height: 1; margin: 0 0 6px;
    }
    .brand-sub {
      font-size: 12px; font-weight: bold; letter-spacing: 4px;
      text-transform: uppercase; color: #3DD9D6;
      margin: 0 0 50px;
    }
    .eyebrow-bar {
      width: 50px; height: 3px; background: #3DD9D6;
      margin: 0 0 18px;
    }
    .eyebrow {
      font-size: 13px; font-weight: bold; letter-spacing: 4px;
      text-transform: uppercase; color: #3DD9D6;
      margin: 0 0 22px;
    }
    h1 {
      font-size: 64px; line-height: 1.0; font-weight: 900;
      color: #fff; margin: 0 0 22px;
      letter-spacing: -1.5px;
    }
    h1 .grad {
      color: #3DD9D6;
    }
    .subtitle {
      font-size: 20px; line-height: 1.4;
      color: #c5cad8;
      margin: 0 0 64px;
      max-width: 1000px;
    }
    .subtitle strong { color: #fff; font-weight: bold; }
    .footer-area {
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.18);
    }
    .footer-table {
      width: 100%;
      border-collapse: collapse;
    }
    .footer-table td {
      vertical-align: middle;
      padding: 0;
    }
    .stat-val {
      font-size: 28px; font-weight: 900; letter-spacing: -0.5px;
      color: #3DD9D6; line-height: 1;
    }
    .stat-lbl {
      font-size: 11px; font-weight: bold; letter-spacing: 2px;
      text-transform: uppercase; color: #c5cad8;
      margin-top: 4px;
    }
    .divider {
      width: 1px; height: 38px;
      background: rgba(255,255,255,0.18);
      margin: 0 24px;
    }
    .url-pill {
      display: inline-block;
      padding: 11px 22px;
      background: rgba(61,217,214,0.10);
      border: 1px solid #3DD9D6;
      border-radius: 999px;
      font-size: 14px; font-weight: bold;
      color: #3DD9D6;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="og">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="triangle"></div>

    <div class="content">
      <div class="brand-name">AVEND</div>
      <div class="brand-sub">Vending Machines &amp; Franchising</div>

      <div class="eyebrow-bar"></div>
      <div class="eyebrow">Diagnóstico Personalizado</div>
      <h1>Quanto sua <span class="grad">1ª máquina</span><br>pode virar em <span class="grad">5 anos</span>?</h1>
      <p class="subtitle">
        Simulador interativo com <strong>tributação real</strong>, patrimônio
        e payback &mdash; sob medida pro seu perfil.
      </p>

      <div class="footer-area">
        <table class="footer-table">
          <tr>
            <td>
              <div class="stat-val">+100</div>
              <div class="stat-lbl">Franqueados</div>
            </td>
            <td><div class="divider"></div></td>
            <td>
              <div class="stat-val">14</div>
              <div class="stat-lbl">Estados</div>
            </td>
            <td><div class="divider"></div></td>
            <td>
              <div class="stat-val">10+</div>
              <div class="stat-lbl">Anos de operação</div>
            </td>
            <td style="text-align: right;">
              <span class="url-pill">grupoavend.com.br</span>
            </td>
          </tr>
        </table>
      </div>
    </div>

    <div class="bottom-line"></div>
  </div>
</body>
</html>
